<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat & Earn</title>

<style>
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#000;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

.container{
  width:94%;
  max-width:400px;
  background:#121212;
  border-radius:20px;
  padding:25px;
  box-shadow:0 10px 35px rgba(0,0,0,0.7);
  position:relative;
}

.notification{
  position:absolute;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  background:linear-gradient(90deg,#ff0050,#ff6ec7);
  padding:10px 16px;
  border-radius:12px;
  font-size:14px;
  font-weight:bold;
  opacity:0;
  transition:0.3s;
}

.notification.show{
  opacity:1;
}

h1{
  font-size:24px;
  margin-top:45px;
  margin-bottom:12px;
}

p{
  font-size:15px;
  line-height:1.5;
  color:#ccc;
}

.live{
  font-size:14px;
  color:#00f2ea;
  margin-top:10px;
}

.timer{
  font-size:16px;
  color:#ff3b5c;
  font-weight:bold;
  margin-top:8px;
}

button{
  margin-top:22px;
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  font-size:17px;
  font-weight:bold;
  background:linear-gradient(90deg,#ff0050,#ff6ec7);
  color:#fff;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

</style>
</head>

<body>

<div class="container">

<div id="popup" class="notification"></div>

<h1>Are you over 15?</h1>

<p>People in <strong>Zimbabwe</strong> are chatting with foreign friends and earning extra money online. Click the button below and follow the instructions to set up your chat profile—it only takes 1 minute!</p>

<div class="live">🔥 <span id="users">127</span> people are chatting now</div>

<div class="timer">⏳ Spots closing in <span id="countdown">02:00</span></div>

<button onclick="goOffer()">CONTINUE</button>

</div>

<script>
const OFFER="https://ln.run/personal";

/* redirect directly */
function goOffer(){
  window.location.href = OFFER;
}

/* fake live user counter */
setInterval(()=>{
  let n=document.getElementById("users");
  let current=parseInt(n.innerText);
  let change=Math.floor(Math.random()*5);
  n.innerText=current+change;
},3000);

/* countdown timer */
let time=120;
setInterval(()=>{
  time--;
  let m=Math.floor(time/60);
  let s=time%60;
  s = s<10?"0"+s:s;
  document.getElementById("countdown").innerText = (m<10?"0"+m:m)+":"+s;
  if(time<=0) time=120;
},1000);

/* top notifications */
const messages=[
  "Tariro just earned $42 chatting",
  "Nyasha received $25 today",
  "Tanaka joined 1 minute ago",
  "Kudakwashe started chatting",
  "Rudo earned $31 today"
];

let i=0;
setInterval(()=>{
  let popup=document.getElementById("popup");
  popup.innerText=messages[i%messages.length];
  popup.classList.add("show");
  setTimeout(()=>{popup.classList.remove("show");},3000);
  i++;
},5000);

</script>

</body>
</html>
